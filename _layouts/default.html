<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en-US' }}">
  <head>
    {%- include head.html -%}
  </head>
  <body>
    {%- include header.html -%}

    <main class="site-main" id="main">
      <div class="container">{{ content }}</div>
    </main>

    {%- include footer.html -%}

    <script
      src="{{ '/assets/js/theme-toggle.js' | relative_url }}"
      defer
    ></script>
    <script src="{{ '/assets/js/copy-code.js' | relative_url }}" defer></script>
    <script
      src="{{ '/assets/js/external-links.js' | relative_url }}"
      defer
    ></script>
    <script
      src="{{ '/assets/js/prefetch-hover.js' | relative_url }}"
      defer
    ></script>
    {%- if page.layout == 'post' -%}
    <script src="{{ '/assets/js/toc.js' | relative_url }}" defer></script>
    {%- endif -%}
    <script
      src="{{ '/assets/js/scroll-header.js' | relative_url }}"
      defer
    ></script>
  </body>
</html>
